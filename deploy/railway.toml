# Railway — push to a GitHub repo, create a new Railway service from it,
# Railway will detect this file and the Dockerfile automatically.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway injects PORT; PORT/DATA_DIR are read by server.py via env.
# Add a volume in the dashboard mounted at /data.
