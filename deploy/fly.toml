# Fly.io app config. Initialise with:  fly launch --copy-config --no-deploy
# Then create the volume + deploy:
#     fly volumes create hfa_td_editor_data --size 1 --region yul
#     fly deploy
app = "hfa-td-editor"
primary_region = "yul"            # closest Fly region (Montreal); change as desired

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "8766"
  DATA_DIR = "/data"

[[mounts]]
  source      = "hfa_td_editor_data"
  destination = "/data"

[http_service]
  internal_port       = 8766
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      grace_period  = "10s"
      interval      = "30s"
      method        = "get"
      path          = "/health"
      port          = 8766
      timeout       = "5s"
      type          = "http"

[[vm]]
  size    = "shared-cpu-1x"
  memory  = "256mb"
